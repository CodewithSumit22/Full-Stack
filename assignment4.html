<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>
</head>
<body>

<center>
    <h3>U S E R &nbsp; F O R M</h3>

    <form>
        <table border="1" cellpadding="10">

            <tr>
                <td>FIRST NAME</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>PASSWORD</td>
                <td><input type="password"></td>
            </tr>

            <tr>
                <td>GENDER</td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>

            <tr>
                <td>ADDRESS</td>
                <td>
                    <textarea rows="4" cols="20"></textarea>
                </td>
            </tr>

            <tr>
                <td>D.O.B</td>
                <td>
                    <select>
                        <option>Jan</option>
                        <option>Feb</option>
                        <option>Mar</option>
                    </select>

                    <select>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                    </select>

                    <select>
                        <option>1990</option>
                        <option>1991</option>
                        <option>1992</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>SELECT GAMES</td>
                <td>
                    <input type="checkbox"> Hockey
                    <input type="checkbox"> Football
                    <input type="checkbox"> Cricket
                    <input type="checkbox"> Volleyball
                </td>
            </tr>

            <tr>
                <td>MARITAL STATUS</td>
                <td>
                    <input type="radio" name="status"> Married
                    <input type="radio" name="status"> Unmarried
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="checkbox">
                    I accept this agreement
                </td>
            </tr>

        </table>
    </form>
</center>

</body>
</html>
